{{/* Editor box — displays the magazine's editor info from site params */}}
{{ with .Site.Params.editor }}
<div class="editor-box" aria-label="সম্পাদক পরিচিতি">
  <div class="editor-box__avatar">
    {{ if .image }}
    <img src="{{ .image | relURL }}" alt="{{ .name }}" class="editor-box__avatar-img" loading="lazy" decoding="async">
    {{ else }}
    <div class="editor-box__avatar-placeholder" aria-hidden="true">
      <svg width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
        <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/>
      </svg>
    </div>
    {{ end }}
  </div>
  <div class="editor-box__body">
    <p class="editor-box__role">সম্পাদক</p>
    <h3 class="editor-box__name">{{ .name }}</h3>
    <a href="mailto:{{ .email }}" class="editor-box__email">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
        <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/>
      </svg>
      {{ .email }}
    </a>
  </div>
</div>
{{ end }}
