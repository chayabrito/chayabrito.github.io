<!DOCTYPE html>
<html lang="bn" data-theme="light">
<head>
  {{- partial "head.html" . -}}
</head>
<body class="page-{{ .Type | default "default" }}{{ if .IsHome }} is-home{{ end }}">
  {{- partial "reading-progress.html" . -}}
  {{- partial "header.html" . -}}

  <main id="main-content" role="main">
    {{- block "main" . }}{{- end }}
  </main>

  {{- partial "footer.html" . -}}
  {{- partial "scripts.html" . -}}
</body>
</html>
