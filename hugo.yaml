baseURL: "https://chayabrito.github.io/"
languageCode: "bn"
title: "ছায়াবৃত"
copyright: "© ২০২৬ ছায়াবৃত। সর্বস্বত্ব সংরক্ষিত।"

# Build
buildDrafts: false
buildFuture: false
enableRobotsTXT: true
enableGitInfo: true

# Pagination
paginate: 12
paginatePath: "page"

# Taxonomies
taxonomies:
  category: categories
  tag: tags

# Permalinks
permalinks:
  articles: "/articles/:slug/"

# Output formats
outputFormats:
  SearchIndex:
    mediaType: "application/json"
    baseName: "search-index"
    isPlainText: true
    notAlternative: true

outputs:
  home:
    - HTML
    - RSS
    - SearchIndex

# Markup
markup:
  goldmark:
    renderer:
      unsafe: true
    extensions:
      footnote: true
      strikethrough: true
      table: true
  highlight:
    style: monokai
    lineNos: false

# Sitemap
sitemap:
  changeFreq: "weekly"
  priority: 0.5

# Menus
menus:
  main:
    - name: "প্রচ্ছদ"
      url: "/"
      weight: 1
